<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Metadata -->
    <title>
      Kinetic Industrial Tech | Industrial AI Agents & Field Technical Service
    </title>
    <meta
      name="description"
      content="Technical building, AI agent design, and industrial systems service. Bridging the gap between legacy hardware and the autonomous frontier."
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Animate On Scroll Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #01040a;
        background-image:
          url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E"),
          radial-gradient(
            circle at 15% 30%,
            rgba(14, 165, 233, 0.08) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 85% 70%,
            rgba(99, 102, 241, 0.08) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 50% 50%,
            rgba(20, 184, 166, 0.06) 0%,
            transparent 60%
          );
        background-attachment: fixed;
        overflow-x: hidden;
      }
      .font-display {
        font-family: "Space Grotesk", sans-serif;
      }
      .glass {
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(48px);
        -webkit-backdrop-filter: blur(48px);
        border: 1px solid rgba(255, 255, 255, 0.03);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        border-left: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow:
          0 8px 32px 0 rgba(0, 0, 0, 0.6),
          inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .glass:hover:not(nav) {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(64px);
        -webkit-backdrop-filter: blur(64px);
        transform: translateY(-5px) scale(1.02);
        border-top: 1px solid rgba(255, 255, 255, 0.3);
        border-left: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow:
          0 15px 40px -10px rgba(0, 0, 0, 0.8),
          inset 0 1px 0 0 rgba(255, 255, 255, 0.2);
        z-index: 10;
      }
      .text-gradient {
        background: linear-gradient(to right, #0ea5e9, #2dd4bf);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .card-hover:hover {
        border-color: rgba(14, 165, 233, 0.4);
        transform: translateY(-5px);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #020617;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #0ea5e9;
      }
    </style>
  </head>
  <body class="text-slate-300 bg-black">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({
        duration: 1000,
        once: true,
        easing: "ease-out",
      });
    </script>
  </body>
</html>
